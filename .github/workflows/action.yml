name: CI - Python

on:
  workflow_dispatch:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

permissions:
  contents: read
  actions: read
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_MIN: "90"

jobs:
  build-test-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install coverage

      - name: Check Python syntax
        run: python -m compileall -q .

      - name: Run tests with coverage quality gate
        run: |
          python -m coverage erase
          python -m coverage run --rcfile=.coveragerc -m unittest discover -s tests/unit -p "test_*.py" -v
          python -m coverage run --rcfile=.coveragerc --append -m unittest discover -s tests/web -p "test_*.py" -v
          python -m coverage report --rcfile=.coveragerc --fail-under=${COVERAGE_MIN} -m
          python -m coverage xml --rcfile=.coveragerc -o coverage.xml
          python -m coverage html --rcfile=.coveragerc -d htmlcov

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/

  sonarqube:
    name: SonarCloud Analysis
    needs: build-test-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ needs.build-test-quality.result == 'success' && vars.SONAR_ORGANIZATION != '' && vars.SONAR_PROJECT_KEY != '' }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check Sonar token availability
        id: sonar_token
        shell: bash
        run: |
          if [ -n "${SONAR_TOKEN}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN is not set. SonarCloud steps are skipped."
          fi

      - name: Checkout code
        if: ${{ steps.sonar_token.outputs.has_token == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        if: ${{ steps.sonar_token.outputs.has_token == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: .

      - name: SonarCloud Scan (with Quality Gate)
        if: ${{ steps.sonar_token.outputs.has_token == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >-
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.python.version=3.11
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300


