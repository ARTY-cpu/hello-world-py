name: CI - Python

on:
  workflow_dispatch:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install coverage

      - name: Check Python syntax
        run: python -m compileall -q .

      - name: Run unit tests
        run: python -m unittest discover -s tests/unit -p "test_*.py" -v

      - name: Run web tests
        run: python -m unittest discover -s tests/web -p "test_*.py" -v

      - name: Run test coverage
        run: |
          python -m coverage run --source=. -m unittest discover -s tests/unit -p "test_*.py" -v
          python -m coverage run --source=. --append -m unittest discover -s tests/web -p "test_*.py" -v
          python -m coverage report -m


