name: CI - Python

on:
  workflow_dispatch:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_MIN: "90"

jobs:
  test-and-coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install coverage

      - name: Syntax check
        run: python -m compileall -q .

      - name: Run tests and enforce coverage
        run: |
          python -m coverage erase
          python -m coverage run --rcfile=.coveragerc -m unittest discover -s tests/unit -p "test_*.py" -v
          python -m coverage run --rcfile=.coveragerc --append -m unittest discover -s tests/web -p "test_*.py" -v
          python -m coverage report --rcfile=.coveragerc --fail-under=${COVERAGE_MIN} -m
          python -m coverage xml --rcfile=.coveragerc -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonarcloud:
    name: SonarCloud
    needs: test-and-coverage
    runs-on: ubuntu-latest
    if: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_PROJECT_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectBaseDir=.
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.python.version=3.11
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300


